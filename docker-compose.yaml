services:
  # --- BASE DE DONN�ES ---
  db:
    image: mysql:8.0
    container_name: lamp-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sql_db
      MYSQL_USER: website-local
      MYSQL_PASSWORD: 1234
    volumes:
      - db_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    networks:
      - lamp-network

  # --- SERVEUR WEB (APACHE + PHP) ---
  web:
    build: .
    container_name: lamp-web
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./www:/var/www/html
    depends_on:
      - db
    networks:
      - lamp-network

  # --- RUNNER DE TESTS (PHPUNIT) ---
  phpunit:
    build: .
    container_name: lamp-tests
    working_dir: /var/www/html/prod
    volumes:
      - ./www:/var/www/html
    environment:
      DB_DSN: mysql:host=db;port=3306;dbname=sql_db;charset=utf8mb4
      DB_USER: website-local
      DB_PASS: 1234
    depends_on:
      - db
    entrypoint: ["/var/www/html/prod/vendor/bin/phpunit", "/var/www/html/prod/tests"]
    networks:
      - lamp-network

# --- R�SEAUX ET VOLUMES ---
networks:
  lamp-network:
    driver: bridge

volumes:
  db_data:
