# =================================================
# 1. PROD - HTTP (Redirect to HTTPS)
# =================================================
<VirtualHost *:80>
    ServerName prod.stageflow.fr
    Redirect permanent / https://prod.stageflow.fr/
</VirtualHost>

# =================================================
# 2. PROD - HTTPS (Main Application)
# =================================================
<VirtualHost *:443>
    ServerName prod.stageflow.fr
    DocumentRoot /var/www/html/prod

    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/stageflow.fr.crt
    SSLCertificateKeyFile /etc/ssl/private/stageflow.fr.key

    ErrorLog /var/log/apache2/prod_ssl_error.log
    CustomLog /var/log/apache2/prod_ssl_access.log combined

    <Directory "/var/www/html/prod">
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted

        <FilesMatch "^\.">
            Require all denied
        </FilesMatch>
    </Directory>

    <Directory "/var/www/html/prod/.back">
        Require all denied
    </Directory>

    <Directory "/var/www/html/prod/vendor">
        Require all denied
    </Directory>

    <Directory "/var/www/html/prod/tests">
        Require all denied
    </Directory>

    <FilesMatch "^(composer\.(json|lock)|\.gitignore|README\.md)$">
        Require all denied
    </FilesMatch>

    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
</VirtualHost>

# =================================================
# 3. CDN - HTTP (Redirect to HTTPS)
# =================================================
<VirtualHost *:80>
    ServerName cdn.stageflow.fr
    Redirect permanent / https://cdn.stageflow.fr/
</VirtualHost>

# =================================================
# 4. CDN - HTTPS (Static Assets)
# =================================================
<VirtualHost *:443>
    ServerName cdn.stageflow.fr
    DocumentRoot /var/www/html/cdn

    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/stageflow.fr.crt
    SSLCertificateKeyFile /etc/ssl/private/stageflow.fr.key

    ErrorLog /var/log/apache2/cdn_ssl_error.log
    CustomLog /var/log/apache2/cdn_ssl_access.log combined

    Header always set Access-Control-Allow-Origin "https://prod.stageflow.fr"
    Header always set X-Content-Type-Options "nosniff"

    <Directory "/var/www/html/cdn">
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted

        <FilesMatch "\.php$">
            Require all denied
        </FilesMatch>
    </Directory>

    <Directory "/var/www/html/cdn/uploads/cvs">
        ForceType application/octet-stream
        <FilesMatch "\.(pdf|jpg|jpeg|png)$">
            ForceType None
        </FilesMatch>
        Header set X-Content-Type-Options "nosniff"
    </Directory>
</VirtualHost>
