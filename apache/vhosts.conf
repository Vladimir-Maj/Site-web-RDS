# =================================================
# 1. PROD - HTTP (Redirect to HTTPS)
# =================================================
<VirtualHost *:80>
    ServerName stageflow.fr
    ServerAlias prod.stageflow.fr www.stageflow.fr
    # Forces all HTTP prod traffic to HTTPS
    Redirect permanent / https://prod.stageflow.fr/
</VirtualHost>

# =================================================
# 2. PROD - HTTPS (The PROD tree)
# =================================================
<VirtualHost *:443>
    ServerName prod.stageflow.fr
    ServerAlias stageflow.fr www.stageflow.fr
    DocumentRoot /var/www/html/prod

    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/stageflow.fr.crt
    SSLCertificateKeyFile /etc/ssl/private/stageflow.fr.key

    <Directory "/var/www/html/prod">
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>

# =================================================
# 3. CDN - HTTP (The CDN tree)
# =================================================
<VirtualHost *:80>
    ServerName cdn.stageflow.fr
    DocumentRoot /var/www/html/cdn

    <Directory "/var/www/html/cdn">
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>

# =================================================
# 4. CDN - HTTPS (The CDN tree + SSL)
# =================================================
<VirtualHost *:443>
    ServerName cdn.stageflow.fr
    DocumentRoot /var/www/html/cdn

    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/stageflow.fr.crt
    SSLCertificateKeyFile /etc/ssl/private/stageflow.fr.key

    # CORS is vital here so PROD can load CSS from CDN
    Header always set Access-Control-Allow-Origin "https://prod.stageflow.fr"

    <Directory "/var/www/html/cdn">
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>