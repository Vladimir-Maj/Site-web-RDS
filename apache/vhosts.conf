# =================================================
# 1. PROD - HTTP (Redirect to HTTPS)
# =================================================
<VirtualHost *:80>
    ServerName stageflow.fr
    ServerAlias prod.stageflow.fr www.stageflow.fr
    
    # Force all HTTP prod traffic to HTTPS
    Redirect permanent / https://prod.stageflow.fr/
</VirtualHost>

# =================================================
# 2. PROD - HTTPS (The Application)
# =================================================
<VirtualHost *:443>
    ServerName prod.stageflow.fr
    ServerAlias stageflow.fr www.stageflow.fr
    DocumentRoot /var/www/html/prod

    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/stageflow.fr.crt
    SSLCertificateKeyFile /etc/ssl/private/stageflow.fr.key

    # --- GLOBAL DIRECTORY SETTINGS ---
    <Directory "/var/www/html/prod">
        Options -Indexes +FollowSymLinks
        AllowOverride All
        # Start with granted so HTML/CSS/JS can be read
        Require all granted

        # A. Block ALL PHP files in the root by default
        <FilesMatch "\.php$">
            Require all denied
        </FilesMatch>

        # B. Explicitly ALLOW the public entry points (index and legals)
        # This MUST come after the general PHP block
        <FilesMatch "^(index|legals)\.php$">
            Require all granted
        </FilesMatch>
    </Directory>

    # --- FUNCTIONAL SUBDIRECTORIES (Allow PHP) ---
    <Directory "/var/www/html/prod/account">
        <FilesMatch "\.php$">
            Require all granted
        </FilesMatch>
    </Directory>

    <Directory "/var/www/html/prod/offers">
        <FilesMatch "\.php$">
            Require all granted
        </FilesMatch>
    </Directory>

    # --- BACKEND LOCKDOWN (Critical) ---
    # Total denial of the .back folder (Models, Repositories, Utils)
    <Directory "/var/www/html/prod/.back">
        Require all denied
    </Directory>

    # --- SENSITIVE DATA BLOCK ---
    <Directory "/var/www/html/prod">
        <FilesMatch "^(composer\.(json|lock)|\.gitignore)$">
            Require all denied
        </FilesMatch>
    </Directory>
</VirtualHost>

# =================================================
# 3. CDN - HTTP (Redirect to HTTPS)
# =================================================
<VirtualHost *:80>
    ServerName cdn.stageflow.fr
    Redirect permanent / https://cdn.stageflow.fr/
</VirtualHost>

# =================================================
# 4. CDN - HTTPS (Asset Delivery)
# =================================================
<VirtualHost *:443>
    ServerName cdn.stageflow.fr
    DocumentRoot /var/www/html/cdn

    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/stageflow.fr.crt
    SSLCertificateKeyFile /etc/ssl/private/stageflow.fr.key

    # CORS: Essential for PROD to load styles/scripts from the CDN
    Header always set Access-Control-Allow-Origin "https://prod.stageflow.fr"

    <Directory "/var/www/html/cdn">
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted

        # Security: No PHP execution allowed on the CDN
        <FilesMatch "\.php$">
            Require all denied
        </FilesMatch>
    </Directory>

    # Extra security for the CV uploads directory
    <Directory "/var/www/html/cdn/uploads/cvs">
        ForceType application/octet-stream
        <FilesMatch "\.(pdf|jpg|jpeg|png)$">
            ForceType (inherit)
        </FilesMatch>
        Header set X-Content-Type-Options "nosniff"
    </Directory>
</VirtualHost>