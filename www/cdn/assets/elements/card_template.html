<div class="card offer-card">
    <div class="card-header">
        <div>
            <h3>{{STAGE_NAME}}</h3>
            <div class="card-meta">
                <span><i class="icon">📍</i>{{STAGE_POSITION}}</span>
                <span><i class="icon">🏢</i>{{STAGE_COMPANY}}</span>
                <span><i class="icon">📅</i>{{STAGE_DATE}}</span>
            </div>
        </div>
        <span class="tag {{STAGE_TAG_CLASS}}">{{STAGE_STATUS}}</span>
    </div>
    <div class="card-body">
        <p>{{STAGE_DESC}}</p>
        <div class="card-actions">
            <a href="editor.html" class="btn btn-outline">Éditer</a>
            <a href="#" class="btn btn-ghost">Détails</a>
            <a href="delete_offer.php?id={{STAGE_ID}}"
               class="btn btn-danger"
               onclick="return confirm('Êtes-vous sûr de vouloir supprimer cette offre ?');">
                Supprimer
            </a>
        </div>
    </div>
</div>
