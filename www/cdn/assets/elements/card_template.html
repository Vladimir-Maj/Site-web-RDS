<div class="card offer-card">
    <div class="card-header">
        <div>
            <h3>{{STAGE_NAME}}</h3>
            <div class="card-meta">
                <span><i class="icon">Localisation :</i>{{STAGE_POSITION}}</span>
                <span><i class="icon">Entreprise :</i>{{STAGE_COMPANY}}</span>
                <span><i class="icon">Dates de publication:</i>{{STAGE_DATE}}</span>
            </div>
        </div>
        <span class="tag {{STAGE_TAG_CLASS}}">{{STAGE_STATUS}}</span>
    </div>
    <div class="card-body">
        <p>{{STAGE_DESC}}</p>
        <div class="card-actions">
            <a href="offers/offer_detail.php?offer_id={{STAGE_ID}}" class="btn btn-primary">
                Détails
            </a>
            <a href="editor.php?id={{STAGE_ID}}" class="btn btn-outline">Modifier</a>
            <a href="offers/offer_delete.php?id={{STAGE_ID}}"
               class="btn btn-danger"
               onclick="return confirm('CONFIRMER LA SUPPRESSION ?');">
                Supprimer
            </a>
        </div>
    </div>
</div>
